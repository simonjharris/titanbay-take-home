services:
  titanbay_backend:
    build: .
    networks:
      - titanbay-network
    ports:
      - "8000:8000"
    environment:
      - ENV=dev
    depends_on:
      - database


  database:
    image: postgres:17-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=titanbay
      - POSTGRES_PASSWORD=titanbay
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 2s
      retries: 5
    networks:
      - titanbay-network

networks:
  titanbay-network:

volumes:
  postgres-data: